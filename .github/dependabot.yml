    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "feat(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "feat(ci)"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "feat(docker)"
